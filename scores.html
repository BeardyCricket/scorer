<!DOCTYPE html>
<!--
  SUPABASE SETUP — run this once in your Supabase SQL editor:

  create table if not exists public.live_scores (
    match_id text primary key,
    updated_at timestamptz not null default now(),
    payload jsonb not null default '{}'::jsonb
  );
  alter table public.live_scores enable row level security;
  create policy "anon_select" on public.live_scores for select to anon using (true);
  create policy "anon_insert" on public.live_scores for insert to anon with check (true);
  create policy "anon_update" on public.live_scores for update to anon using (true) with check (true);
  alter publication supabase_realtime add table public.live_scores;
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a4a2e">
<title>Beardy Cricket — Live Scores</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --brand:#1a4a2e;--brand-l:#e8f0eb;
    --purple:#7c3aed;--purple-l:#ede9fe;
    --blue:#2563eb;--blue-l:#dbeafe;
    --grey:#4b5563;--grey-l:#f3f4f6;
    --red:#dc2626;--red-l:#fee2e2;
    --green:#16a34a;--green-l:#dcfce7;
    --orange:#ea580c;--orange-l:#ffedd5;
    --pink:#db2777;--pink-l:#fce7f3;
    --border:#e5e7eb;--muted:#6b7280;
    --cream:#f5f0e8;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:40px}

  /* Header */
  .hdr{background:var(--brand);padding:14px 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .hdr-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px}
  .live-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border-radius:12px;padding:4px 10px;flex-shrink:0}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .live-badge.offline .live-dot{background:#f87171;animation:none}
  .live-txt{color:#fff;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

  /* Status bar */
  .status-bar{background:rgba(26,74,46,.08);padding:8px 16px;font-size:12px;color:var(--brand);font-weight:600;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(26,74,46,.12)}

  /* Cards */
  .card{background:#fff;border-radius:14px;margin:12px 12px 0;border:1px solid var(--border);overflow:hidden}

  /* Color accents */
  .c-purple{border-color:var(--purple)!important}
  .c-blue{border-color:var(--blue)!important}
  .c-grey{border-color:var(--grey)!important}
  .c-red{border-color:var(--red)!important}
  .c-green{border-color:var(--green)!important}
  .c-orange{border-color:var(--orange)!important}
  .c-pink{border-color:var(--pink)!important}

  .t-purple{color:var(--purple)}
  .t-blue{color:var(--blue)}
  .t-grey{color:var(--grey)}
  .t-red{color:var(--red)}
  .t-green{color:var(--green)}
  .t-orange{color:var(--orange)}
  .t-pink{color:var(--pink)}

  .bg-purple{background:var(--purple-l)}
  .bg-blue{background:var(--blue-l)}
  .bg-grey{background:var(--grey-l)}
  .bg-red{background:var(--red-l)}
  .bg-green{background:var(--green-l)}
  .bg-orange{background:var(--orange-l)}
  .bg-pink{background:var(--pink-l)}

  /* Batting card */
  .bat-card-inner{padding:16px}
  .bat-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .bat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .d-purple{background:var(--purple)}
  .d-blue{background:var(--blue)}
  .d-grey{background:var(--grey)}
  .d-red{background:var(--red)}
  .d-green{background:var(--green)}
  .d-orange{background:var(--orange)}
  .d-pink{background:var(--pink)}

  .bat-pair-name{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
  .bat-players{font-size:13px;color:var(--muted);margin-bottom:14px}
  .bat-score-row{display:flex;align-items:flex-end;justify-content:space-between}
  .bat-total{font-size:58px;font-weight:800;line-height:1;letter-spacing:-2px}
  .bat-breakdown{text-align:right}
  .bat-breakdown-line{font-size:13px;color:var(--muted);line-height:1.8}
  .bat-ovs{font-size:14px;font-weight:700;margin-top:4px}
  .over-pill{display:inline-block;background:var(--brand);color:#fff;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;margin-top:12px}

  /* Bowling card */
  .bowl-inner{padding:12px 16px;display:flex;align-items:center;gap:12px}
  .bowl-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .bowl-name{font-size:16px;font-weight:700}
  .bowl-players{font-size:12px;color:var(--muted)}

  /* Scoreboard */
  .sb-header{padding:10px 16px 6px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .sb-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px}
  .sb-row:last-child{border-bottom:none}
  .sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .sb-name{flex:1;min-width:0}
  .sb-cname{font-size:14px;font-weight:700}
  .sb-players{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-score{text-align:right;flex-shrink:0}
  .sb-total{font-size:22px;font-weight:800;line-height:1}
  .sb-breakdown{font-size:11px;color:var(--muted)}
  .sb-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block}
  .sb-tag-bat{background:var(--brand-l);color:var(--brand)}
  .sb-tag-bowl{background:var(--grey-l);color:var(--muted)}

  /* States */
  .waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;min-height:60vh}
  .waiting-icon{font-size:48px;margin-bottom:16px}
  .waiting-title{font-size:20px;font-weight:700;color:var(--brand);margin-bottom:8px}
  .waiting-sub{font-size:14px;color:var(--muted);line-height:1.5}
  .finished-banner{background:var(--brand);color:#fff;margin:12px;border-radius:14px;padding:14px 16px;text-align:center}
  .finished-banner h2{font-size:16px;font-weight:800;margin-bottom:2px}
  .finished-banner p{font-size:13px;opacity:.8}

  .updated{text-align:center;padding:20px 16px 4px;font-size:11px;color:var(--muted)}
  .hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Beardy Cricket</div>
  <div class="live-badge" id="live-badge">
    <div class="live-dot" id="live-dot"></div>
    <span class="live-txt" id="live-txt">Live</span>
  </div>
</div>

<div class="status-bar hidden" id="status-bar">
  <span id="status-over"></span>
  <span id="status-match"></span>
</div>

<div id="main-content">
  <div class="waiting" id="waiting-state">
    <div class="waiting-icon">🏏</div>
    <div class="waiting-title">Waiting for match…</div>
    <div class="waiting-sub">The scoreboard will update automatically when the match starts. No need to refresh.</div>
  </div>
</div>

<div class="updated hidden" id="updated-line">Updated <span id="updated-time"></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://gdhqqcqzshvomnyfhsya.supabase.co';
const SUPABASE_KEY='sb_publishable_tYpM6ALOCT5Y39VjoKpSOw_QdL-K4Kv';
const {createClient}=supabase;
const client=createClient(SUPABASE_URL,SUPABASE_KEY);

const params=new URLSearchParams(window.location.search);
let matchId=params.get('match')||null;
let channel=null;

// ── Rendering ─────────────────────────────────────────────────────────────
function colorClass(c){return['purple','blue','grey','red','green','orange','pink'].includes(c)?c:'grey';}

function render(payload){
  if(!payload){return;}
  const mc=document.getElementById('main-content');
  mc.innerHTML='';

  const finished=payload.status==='finished';
  const bi=payload.batting;
  const bwi=payload.bowling;
  const pairs=payload.pairs||[];

  // Finished banner
  if(finished){
    const b=document.createElement('div');
    b.className='finished-banner';
    b.innerHTML='<h2>Match complete</h2><p>Final scores below</p>';
    mc.appendChild(b);
  }

  // Status bar
  const sb=document.getElementById('status-bar');
  const so=document.getElementById('status-over');
  const sm=document.getElementById('status-match');
  sb.classList.remove('hidden');
  if(finished){
    so.textContent='Final';
    sm.textContent=`${payload.total_overs} overs`;
  } else {
    const ball=payload.ball;
    const over=payload.over;
    so.textContent=ball>=6?`End of Over ${over}`:`Over ${over}, Ball ${ball} of 6`;
    sm.textContent=`${over} / ${payload.total_overs} overs`;
  }

  // Batting card
  if(bi){
    const cc=colorClass(bi.color);
    const ovs=Math.floor(bi.balls_faced/6);
    const bls=bi.balls_faced%6;
    const card=document.createElement('div');
    card.className=`card c-${cc}`;
    card.innerHTML=`<div class="bat-card-inner bg-${cc}" style="background:var(--${cc}-l)">
      <div class="bat-lbl"><div class="bat-dot d-${cc}"></div>${finished?'Last batting':'Batting now'}</div>
      <div class="bat-pair-name t-${cc}">${esc(bi.cname)} pair</div>
      <div class="bat-players">${esc(bi.players.join(' & '))}</div>
      <div class="bat-score-row">
        <div class="bat-total t-${cc}">${bi.total}</div>
        <div class="bat-breakdown">
          <div class="bat-breakdown-line">${bi.bat} bat</div>
          <div class="bat-breakdown-line">+${bi.bowl} bowl bonus</div>
          <div class="bat-ovs">${ovs}.${bls} overs faced</div>
        </div>
      </div>
      ${!finished?`<div class="over-pill">${payload.ball>=6?`End of Over ${payload.over}`:`Over ${payload.over} · Ball ${payload.ball}`}</div>`:''}
    </div>`;
    mc.appendChild(card);
  }

  // Bowling card
  if(bwi&&!finished){
    const cc=colorClass(bwi.color);
    const card=document.createElement('div');
    card.className=`card c-${cc}`;
    card.innerHTML=`<div class="bowl-inner">
      <div class="bat-dot d-${cc}" style="width:12px;height:12px;flex-shrink:0"></div>
      <div>
        <div class="bowl-lbl">Bowling</div>
        <div class="bowl-name t-${cc}">${esc(bwi.cname)} pair</div>
        <div class="bowl-players">${esc(bwi.players.join(' & '))}</div>
      </div>
    </div>`;
    mc.appendChild(card);
  }

  // All scores
  if(pairs.length){
    const batIdx=bi?pairs.findIndex(p=>p.cname===bi.cname):-1;
    const bowlIdx=bwi?pairs.findIndex(p=>p.cname===bwi.cname):-1;
    const sorted=[...pairs].sort((a,b)=>b.total-a.total);
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="sb-header">All pairs</div>${sorted.map(p=>{
      const cc=colorClass(p.color);
      const isBat=p.cname===(bi&&bi.cname);
      const isBowl=!finished&&p.cname===(bwi&&bwi.cname);
      const ovs=Math.floor(p.balls_faced/6),bls=p.balls_faced%6;
      return `<div class="sb-row">
        <div class="sb-dot d-${cc}"></div>
        <div class="sb-name">
          <div class="sb-cname t-${cc}">${esc(p.cname)} pair</div>
          <div class="sb-players">${esc(p.players.join(' & '))}</div>
          ${isBat?`<span class="sb-tag sb-tag-bat">batting now</span>`:''}
          ${isBowl?`<span class="sb-tag sb-tag-bowl">bowling</span>`:''}
        </div>
        <div class="sb-score">
          <div class="sb-total t-${cc}">${p.total}</div>
          <div class="sb-breakdown">${p.bat}+${p.bowl} · ${ovs}.${bls} ovs</div>
        </div>
      </div>`;
    }).join('')}`;
    mc.appendChild(card);
  }

  // Timestamp
  const ul=document.getElementById('updated-line');
  const ut=document.getElementById('updated-time');
  const now=new Date();
  ut.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  ul.classList.remove('hidden');
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setConnected(ok){
  const badge=document.getElementById('live-badge');
  const dot=document.getElementById('live-dot');
  const txt=document.getElementById('live-txt');
  if(ok){badge.classList.remove('offline');dot.style.background='#4ade80';dot.style.animation='';txt.textContent='Live';}
  else{badge.classList.add('offline');dot.style.background='#f87171';dot.style.animation='none';txt.textContent='Offline';}
}

// ── Supabase subscription ────────────────────────────────────────────────
function subscribeToMatch(id){
  if(channel)client.removeChannel(channel);
  channel=client.channel(`match-${id}`)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'live_scores',filter:`match_id=eq.${id}`},
      p=>{render(p.new.payload);})
    .subscribe(status=>{setConnected(status==='SUBSCRIBED');});
}

function subscribeForAnyMatch(){
  if(channel)client.removeChannel(channel);
  channel=client.channel('any-match')
    .on('postgres_changes',{event:'*',schema:'public',table:'live_scores'},p=>{
      const row=p.new||{};
      if(!row.match_id)return;
      matchId=row.match_id;
      render(row.payload);
      subscribeToMatch(matchId);
    })
    .subscribe(status=>{setConnected(status==='SUBSCRIBED');});
}

// ── Bootstrap ────────────────────────────────────────────────────────────
async function init(){
  if(matchId){
    const {data,error}=await client.from('live_scores').select('payload').eq('match_id',matchId).maybeSingle();
    if(data)render(data.payload);
    subscribeToMatch(matchId);
  } else {
    const {data}=await client.from('live_scores').select('match_id,payload').order('updated_at',{ascending:false}).limit(1).maybeSingle();
    if(data){matchId=data.match_id;render(data.payload);subscribeToMatch(matchId);}
    else{subscribeForAnyMatch();}
  }
}

init();
</script>
</body>
</html>
